name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: metadata-analyzer-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: metadata-analyzer-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: metadata-analyzer-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: metadata-analyzer-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.binary }}" == *.exe ]]; then
            mv "target/${{ matrix.target }}/release/metadata-analyzer.exe" "${{ matrix.binary }}"
          else
            mv "target/${{ matrix.target }}/release/metadata-analyzer" "${{ matrix.binary }}"
          fi

      - name: Upload to release
        run: gh release upload ${{ github.ref_name }} ${{ matrix.binary }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
